name: validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    name: validate manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON manifests
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            echo "Checking $f"
            if ! python3 -m json.tool "$f" >/dev/null; then
              echo "::error file=$f::Invalid JSON"
              fail=1
            fi
          done < <(find . -type f -name '*.json' -not -path './node_modules/*' -not -path './.git/*')
          exit $fail

      - name: Validate SKILL.md frontmatter
        run: |
          set -e
          while IFS= read -r f; do
            echo "Checking $f"
            python3 - <<PY
import sys, re
content = open("$f").read()
m = re.match(r'^---\n(.*?)\n---\n', content, re.DOTALL)
if not m:
    print("::error file=$f::Missing YAML frontmatter")
    sys.exit(1)
front = m.group(1)
if 'name:' not in front:
    print("::error file=$f::Missing required 'name' field")
    sys.exit(1)
if 'description:' not in front:
    print("::error file=$f::Missing required 'description' field")
    sys.exit(1)
print("OK")
PY
          done < <(find opendeploy/skills -name 'SKILL.md' -type f)
